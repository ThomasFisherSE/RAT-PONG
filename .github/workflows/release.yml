name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: rat-pong-linux-x86_64
            binary_ext: ""
          - target: x86_64-apple-darwin
            os: macos-13
            artifact_name: rat-pong-macos-x86_64
            binary_ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: rat-pong-macos-aarch64
            binary_ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: rat-pong-windows-x86_64.exe
            binary_ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/rat-pong${{ matrix.binary_ext }}" "${{ matrix.artifact_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/* --title "Release ${{ github.ref_name }}" --generate-notes
